name: Production - Deploy to AWS

on:
  pull_request:
    branches: [prod]
  push:
    branches: [prod]

jobs:
  validate-source-branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR comes from staging in this repository
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Pull requests into prod cannot come from forks."
            exit 1
          fi

          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "Pull requests into prod must come from the staging branch."
            exit 1
          fi

  deploy:
    if: github.event_name == 'push' && github.repository == 'harvard-lil/perma-filecheck'
    uses: harvard-lil/lil-actions/.github/workflows/ecs-simple-deploy.yml@main
    with:
      app-name: perma-filecheck
      environment: prod
    secrets:
      aws-role-arn: ${{ secrets.PROD_AWS_ROLE_TO_ASSUME }}